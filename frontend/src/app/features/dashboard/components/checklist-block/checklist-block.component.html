<div class="checklist-block" [attr.data-block-id]="block().id">
  @for (item of block().items; track $index) {
    <div class="checklist-row">
      <label class="checklist-row__check">
        <input
          type="checkbox"
          class="checklist-row__checkbox"
          [checked]="item.checked"
          (change)="onToggle($index)"
          [attr.aria-label]="'Item ' + ($index + 1) + ', completed'"
        />
      </label>
      <input
        #itemText
        type="text"
        class="checklist-row__text"
        [attr.data-block-id]="block().id"
        [attr.data-checklist-item]="$index"
        (focusin)="onItemFocusIn($index)"
        (focusout)="onItemFocusOut()"
        (input)="onItemInput($index, $event)"
        (keydown)="onItemKeydown($index, $event)"
        aria-label="Item text"
      />
    </div>
  }
</div>
