<div
  class="block-list"
  cdkDropList
  cdkDropListOrientation="vertical"
  [cdkDropListData]="blocks()"
  [cdkDropListDisabled]="!reorderMode()"
  (cdkDropListDropped)="onDrop($event)"
>
  @for (block of blocks(); track block.id) {
    <div
      class="block-list__row"
      [class.block-list__row--search-hit]="rowMatchesHighlight(block)"
      [class.block-list__row--selected]="selectMode() && isBlockSelected(block.id)"
      cdkDrag
      [cdkDragDisabled]="!reorderMode()"
    >
      <div class="block-list__row-inner">
        @if (selectMode()) {
          <div class="block-list__select-col">
            <label class="block-list__select-label">
              <input
                type="checkbox"
                class="block-list__select-checkbox"
                [checked]="isBlockSelected(block.id)"
                (change)="onSelectionCheckboxChange(block.id, $event)"
                [attr.aria-label]="'Select block'"
              />
            </label>
          </div>
        }
        @if (reorderMode()) {
          <div class="block-list__handle-col">
            <button
              type="button"
              class="block-list__handle"
              cdkDragHandle
              aria-label="Drag to reorder"
            >
              <svg
                class="block-list__handle-icon"
                width="14"
                height="18"
                viewBox="0 0 14 18"
                aria-hidden="true"
                focusable="false"
              >
                <circle cx="4" cy="3.5" r="1.4" fill="currentColor" />
                <circle cx="10" cy="3.5" r="1.4" fill="currentColor" />
                <circle cx="4" cy="9" r="1.4" fill="currentColor" />
                <circle cx="10" cy="9" r="1.4" fill="currentColor" />
                <circle cx="4" cy="14.5" r="1.4" fill="currentColor" />
                <circle cx="10" cy="14.5" r="1.4" fill="currentColor" />
              </svg>
            </button>
          </div>
        }
        <div class="block-list__slot-wrapper">
          <div class="block-list__slot">
            @switch (block.type) {
              @case (BlockType.Text) {
                <app-text-block
                  [block]="asTextBlock(block)"
                  (contentChange)="contentChange.emit($event)"
                  (fieldKeydown)="fieldKeydown.emit($event)"
                />
              }
              @case (BlockType.Checklist) {
                <app-checklist-block
                  [block]="asChecklistBlock(block)"
                  (toggleItem)="toggleItem.emit($event)"
                  (itemTextChange)="itemTextChange.emit($event)"
                  (itemKeydown)="itemKeydown.emit($event)"
                  (itemPriorityChange)="itemPriorityChange.emit($event)"
                />
              }
              @default {}
            }
          </div>
        </div>
      </div>
    </div>
  }
</div>
