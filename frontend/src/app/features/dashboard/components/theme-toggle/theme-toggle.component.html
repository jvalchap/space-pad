<button
  type="button"
  class="theme-toggle"
  [attr.aria-pressed]="theme.mode() === ThemeMode.Dark"
  [attr.aria-label]="
    theme.mode() === ThemeMode.Dark ? 'Switch to light theme' : 'Switch to dark theme'
  "
  (click)="onClick()"
>
  @if (theme.mode() === ThemeMode.Dark) {
    <svg lucideSun [size]="20" [strokeWidth]="2" class="theme-toggle__icon" aria-hidden="true"></svg>
  } @else {
    <svg lucideMoon [size]="20" [strokeWidth]="2" class="theme-toggle__icon" aria-hidden="true"></svg>
  }
</button>
