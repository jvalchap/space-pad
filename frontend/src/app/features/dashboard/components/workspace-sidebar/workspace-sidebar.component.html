<aside
  id="workspace-navigation"
  class="workspace-sidebar"
  aria-label="Tus dashboards"
>
  <div class="workspace-sidebar__brand">
    <span class="workspace-sidebar__logo">Space Pad</span>
  </div>

  <div class="workspace-sidebar__section-title">Dashboards</div>

  @if (workspace$ | async; as ws) {
    <nav class="workspace-sidebar__nav" aria-label="Dashboard list">
      <ul class="workspace-sidebar__list">
        @for (page of ws.pages; track page.id) {
          <li>
            <div class="workspace-sidebar__row">
              <button
                type="button"
                class="workspace-sidebar__item"
                [class.workspace-sidebar__item--active]="page.id === ws.activePageId"
                (click)="selectPageAndCloseMobile(page.id)"
              >
                <span class="workspace-sidebar__item-body">
                  <span class="workspace-sidebar__item-title">{{ page.title }}</span>
                  @if (page.tags.length > 0) {
                    <span class="workspace-sidebar__tags" aria-label="Labels">
                      @for (tag of page.tags; track tag) {
                        <span class="workspace-sidebar__tag">{{ tag }}</span>
                      }
                    </span>
                  }
                </span>
              </button>

              <div class="workspace-sidebar__menu">
                <button
                  type="button"
                  class="workspace-sidebar__menu-trigger"
                  (click)="toggleMenu(page.id, $event)"
                  aria-label="Dashboard actions"
                  [attr.aria-expanded]="openMenuForDashboardId() === page.id"
                >
                  <svg lucideMoreVertical [size]="18" [strokeWidth]="2" aria-hidden="true"></svg>
                </button>

                @if (openMenuForDashboardId() === page.id) {
                  <div class="workspace-sidebar__menu-popover" role="menu">
                    <button
                      type="button"
                      class="workspace-sidebar__menu-item workspace-sidebar__menu-item--danger"
                      role="menuitem"
                      (click)="requestDelete(page.id, $event)"
                    >
                      <svg lucideTrash2 [size]="16" [strokeWidth]="2" aria-hidden="true"></svg>
                      <span>Delete</span>
                    </button>
                  </div>
                }
              </div>
            </div>
          </li>
        }
      </ul>
    </nav>
  }

  <button type="button" class="workspace-sidebar__new" (click)="openNewDashboardAndCloseMobile()">
    + New dashboard
  </button>
</aside>
