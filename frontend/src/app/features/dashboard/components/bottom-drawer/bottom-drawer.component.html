<div class="bottom-drawer" [class.bottom-drawer--open]="open()">
  <div
    class="bottom-drawer__backdrop"
    role="presentation"
    tabindex="-1"
    (click)="onBackdropClick($event)"
  ></div>

  <div
    class="bottom-drawer__panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="bottom-drawer-title"
  >
    <div class="bottom-drawer__handle" aria-hidden="true"></div>
    <h2 id="bottom-drawer-title" class="bottom-drawer__title">Insert block</h2>
    <ul class="bottom-drawer__options" role="list">
      <li>
        <button type="button" class="bottom-drawer__option" (click)="pickType(BlockType.Text)">
          <span class="bottom-drawer__option-label">Text</span>
          <span class="bottom-drawer__option-hint">Paragraph</span>
        </button>
      </li>
      <li>
        <button type="button" class="bottom-drawer__option" (click)="pickType(BlockType.Checklist)">
          <span class="bottom-drawer__option-label">Checklist</span>
          <span class="bottom-drawer__option-hint">Task list with checkboxes</span>
        </button>
      </li>

      @for (template of blockTemplates; track template.id) {
        <li>
          <button
            type="button"
            class="bottom-drawer__option"
            (click)="pickTemplate(template.id)"
          >
            <span class="bottom-drawer__option-label">{{ template.name }}</span>
            <span class="bottom-drawer__option-hint">{{ template.description }}</span>
          </button>
        </li>
      }
    </ul>
  </div>
</div>
