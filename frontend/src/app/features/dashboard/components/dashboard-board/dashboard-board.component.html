<div class="dashboard-board" cdkDropListGroup>
  @for (column of columns; track column.id) {
    <section class="dashboard-board__column" [attr.aria-label]="column.title">
      <h2 class="dashboard-board__heading">{{ column.title }}</h2>
      <div
        class="dashboard-board__drop"
        cdkDropList
        [cdkDropListData]="dataFor(column.id)"
        [id]="listId(column.id)"
        (cdkDropListDropped)="drop($event, column.id)"
      >
        @for (card of dataFor(column.id); track card.id) {
          <article class="dashboard-board__card" cdkDrag>
            <textarea
              class="dashboard-board__textarea"
              rows="3"
              [ngModel]="card.content"
              (ngModelChange)="onCardText(card.id, $event)"
              [attr.data-block-id]="card.id"
              [attr.aria-label]="'Card in ' + column.title"
              placeholder="Write a task…"
            ></textarea>
          </article>
        }
      </div>
    </section>
  }
</div>
