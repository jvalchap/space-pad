<div
  class="dashboard-shell"
  [class.dashboard-shell--sidebar-open]="mobileSidebarOpen()"
>
  <div
    class="dashboard-shell__nav-backdrop"
    [class.dashboard-shell__nav-backdrop--open]="mobileSidebarOpen()"
    (click)="closeMobileSidebar()"
    aria-hidden="true"
  ></div>

  <app-workspace-sidebar
    class="dashboard-shell__sidebar"
    (pageSelect)="onSidebarPageSelect($event)"
    (newDashboard)="openNewDashboardDialog()"
    (dashboardDelete)="onSidebarDashboardDelete($event)"
    (mobileCloseRequest)="closeMobileSidebar()"
  />
  <div class="dashboard-shell__main-container">
    <header class="dashboard-top-bar">
      <button
        type="button"
        class="dashboard-top-bar__menu"
        [attr.aria-expanded]="mobileSidebarOpen()"
        aria-controls="workspace-navigation"
        [attr.aria-label]="mobileSidebarOpen() ? 'Close navigation' : 'Open navigation'"
        (click)="toggleMobileSidebar()"
      >
        <span class="dashboard-top-bar__menu-bars" aria-hidden="true"></span>
      </button>
      <app-global-search-bar class="dashboard-top-bar__search" />
      <div class="dashboard-top-bar__session">
        <app-user-menu />
      </div>
    </header>
    <div class="dashboard-shell__main">
      @if (workspaceLoading()) {
        <div class="dashboard-loading" aria-live="polite">Cargando…</div>
      }

      @if (workspaceError(); as errorMessage) {
        <div class="dashboard-error" role="alert">
          <span class="dashboard-error__text">{{ errorMessage }}</span>
          <button type="button" class="dashboard-error__dismiss" (click)="dismissWorkspaceError()">
            Cerrar
          </button>
        </div>
      }

      <app-dashboard-toolbar
        [mode]="toolbarMode()"
        [selectedCount]="selectedBlockIds().length"
        [selectDisabled]="toolbarMode() === 'reorder'"
        [boardMode]="isBoardDashboard()"
        [addButtonLabel]="isBoardDashboard() ? '+ Add card' : 'Add block'"
        (addBlock)="onToolbarAddBlock()"
        (reorderPressed)="onToolbarReorderStart()"
        (reorderDone)="onToolbarReorderDone()"
        (selectPressed)="onToolbarSelectToggle()"
        (sharePressed)="onToolbarShare()"
        (cancelSelect)="onToolbarCancelSelect()"
        (deleteSelected)="onToolbarDeleteSelected()"
        (moveSelected)="onToolbarMoveSelected()"
      />

      <main class="dashboard-doc" aria-label="Dashboard content">
        @if (isBoardDashboard()) {
          <app-board
            [cards]="cardBlocks()"
            [dashboardId]="dashboard.getActivePageId()"
            (layoutChange)="onBoardLayoutChange($event)"
            (cardTextChange)="onCardTextChange($event)"
            (cardAdd)="onBoardCardAdd($event)"
            (cardDelete)="onBoardCardDelete($event)"
            (cardLabelsChange)="onBoardCardLabels($event)"
          />
        } @else {
          @if (blocks$ | async; as blocks) {
            <app-block-list
              [blocks]="blocks"
              [highlightQuery]="(dashboard.globalSearchHighlight$ | async) ?? ''"
              [reorderMode]="reorderMode()"
              [selectMode]="selectMode()"
              [selectedBlockIds]="selectedBlockIds()"
              (blocksReordered)="onBlocksReordered($event)"
              (blockSelectionToggle)="toggleBlockSelection($event)"
              (contentChange)="onTextLikeContent($event)"
              (fieldKeydown)="onTextLikeFieldKeydown($event)"
              (toggleItem)="onChecklistToggle($event)"
              (itemTextChange)="onChecklistItemText($event)"
              (itemKeydown)="onChecklistItemKeydown($event)"
              (itemPriorityChange)="onChecklistItemPriority($event)"
            />
          }
        }
      </main>
    </div>

    @if (!isBoardDashboard()) {
      <footer class="dashboard-floating-bar" aria-label="Block creation">
        <button type="button" class="dashboard-add-btn" (click)="dashboard.openBlockTypeDrawer()">
          What will you create?
        </button>
      </footer>
    }
  </div>
</div>

<app-new-dashboard-dialog
  [open]="newDashboardOpen()"
  (closed)="closeNewDashboardDialog()"
  (createDashboard)="onCreateDashboardFromDialog($event)"
/>

@if (!isBoardDashboard()) {
  <app-bottom-drawer
    [open]="(dashboard.blockTypeDrawerOpen$ | async) ?? false"
    (closeDrawer)="dashboard.closeBlockTypeDrawer()"
    (blockPresetPicked)="onBlockPresetPicked($event)"
  />
}
