<div class="dashboard-shell">
  <main class="dashboard-doc" aria-label="Dashboard">
    @if (blocks$ | async; as blocks) {
      <app-block-list
        [blocks]="blocks"
        [reorderMode]="reorderMode()"
        (blocksReordered)="onBlocksReordered($event)"
        (contentChange)="onTextLikeContent($event)"
        (fieldKeydown)="onTextLikeFieldKeydown($event)"
        (toggleItem)="onChecklistToggle($event)"
        (itemTextChange)="onChecklistItemText($event)"
        (itemKeydown)="onChecklistItemKeydown($event)"
      />
    }
  </main>

  <footer class="dashboard-floating-bar" aria-label="Acciones del dashboard">
    <button type="button" class="dashboard-add-btn" (click)="editor.openBlockTypeDrawer()">
      Add block
    </button>
    <button
      type="button"
      class="dashboard-reorder-btn"
      [class.dashboard-reorder-btn--active]="reorderMode()"
      [attr.aria-pressed]="reorderMode()"
      (click)="toggleReorderMode()"
    >
      {{ reorderMode() ? 'Done reordering' : 'Reorder blocks' }}
    </button>
  </footer>
</div>

<app-bottom-drawer
  [open]="(editor.blockTypeDrawerOpen$ | async) ?? false"
  (closeDrawer)="editor.closeBlockTypeDrawer()"
  (blockTypePicked)="editor.insertBlockTypeFromPicker($event)"
/>
