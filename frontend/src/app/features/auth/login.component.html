<div class="login-page">
	<header class="login-page__header">
		<span class="login-page__brand">Space Pad</span>
		<app-theme-toggle />
	</header>
	<main class="login-page__card" aria-labelledby="login-title">
		<h1 id="login-title" class="login-page__title">
			{{ isRegisterMode() ? 'Create account' : 'Login' }}
		</h1>
		<form class="login-page__form" novalidate (ngSubmit)="submit()">
			<label class="login-page__field">
				<span class="login-page__label">Email</span>
				<input
					class="login-page__input"
					type="email"
					name="email"
					[(ngModel)]="email"
					required
					autocomplete="email"
				/>
			</label>

			@if (isRegisterMode()) {
				<label class="login-page__field">
					<span class="login-page__label">Username</span>
					<div class="login-page__input-affix">
						<input
							class="login-page__input"
							[class.login-page__input--with-affix-checking]="
								usernameCheckState() === 'checking'
							"
							[class.login-page__input--with-affix-ok]="
								usernameCheckState() === 'available'
							"
							type="text"
							name="username"
							[(ngModel)]="username"
							required
							minlength="2"
							maxlength="32"
							autocomplete="username"
							(input)="onUsernameInput()"
							(blur)="onUsernameBlur()"
						/>
						@if (usernameCheckState() === 'checking') {
							<span class="login-page__username-checking" aria-hidden="true"
								>Checking…</span
							>
						}
						@if (usernameCheckState() === 'available') {
							<span
								class="login-page__username-ok"
								role="status"
								aria-label="Username is available"
							>
								<svg lucideCheck [size]="20" [strokeWidth]="2" aria-hidden="true"></svg>
							</span>
						}
					</div>
					@if (usernameCheckState() === 'taken') {
						<p class="login-page__field-feedback login-page__field-feedback--error">
							This username is already taken.
						</p>
					}
					@if (usernameCheckState() === 'error') {
						<p class="login-page__field-feedback login-page__field-feedback--error">
							Could not verify this username. Try again.
						</p>
					}
				</label>
			}

			<label class="login-page__field">
				<span class="login-page__label">Password</span>
				<div class="login-page__password-wrap">
					<input
						class="login-page__input login-page__input--with-toggle"
						[type]="passwordVisible() ? 'text' : 'password'"
						name="password"
						[(ngModel)]="password"
						required
						[attr.minlength]="isRegisterMode() ? 8 : null"
						[attr.autocomplete]="isRegisterMode() ? 'new-password' : 'current-password'"
					/>
					<button
						type="button"
						class="login-page__password-toggle"
						(click)="togglePasswordVisible()"
						[attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
						[attr.aria-pressed]="passwordVisible()"
					>
						@if (passwordVisible()) {
							<svg lucideEyeOff [size]="20" [strokeWidth]="2" aria-hidden="true"></svg>
						} @else {
							<svg lucideEye [size]="20" [strokeWidth]="2" aria-hidden="true"></svg>
						}
					</button>
				</div>
			</label>

			@if (errorMessage().length > 0) {
				<p class="login-page__error" role="alert">{{ errorMessage() }}</p>
			}

			<button
				type="submit"
				class="login-page__submit"
				[disabled]="isSubmitting()"
			>
				{{ isSubmitting() ? 'Wait...' : isRegisterMode() ? 'Register' : 'Login' }}
			</button>
		</form>

		<p class="login-page__switch">
			<button type="button" class="login-page__link" (click)="toggleMode()">
				{{
					isRegisterMode()
						? 'Already have an account? Login'
						: 'No account yet? Register!'
				}}
			</button>
		</p>
	</main>
</div>
